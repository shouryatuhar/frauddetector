services:
  - type: web
    name: frauddetector
    runtime: python
    buildCommand: pip install -r demo_requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
